name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Django 3.2 (LTS, EOL April 2024)
          - python-version: "3.8"
            django-version: "3.2"
          - python-version: "3.9"
            django-version: "3.2"
          - python-version: "3.10"
            django-version: "3.2"

          # Django 4.2 (LTS)
          - python-version: "3.8"
            django-version: "4.2"
          - python-version: "3.9"
            django-version: "4.2"
          - python-version: "3.10"
            django-version: "4.2"
          - python-version: "3.11"
            django-version: "4.2"
          - python-version: "3.12"
            django-version: "4.2"
          - python-version: "3.13"
            django-version: "4.2"

          # Django 5.0
          - python-version: "3.10"
            django-version: "5.0"
          - python-version: "3.11"
            django-version: "5.0"
          - python-version: "3.12"
            django-version: "5.0"

          # Django 5.1
          - python-version: "3.10"
            django-version: "5.1"
          - python-version: "3.11"
            django-version: "5.1"
          - python-version: "3.12"
            django-version: "5.1"
          - python-version: "3.13"
            django-version: "5.1"

          # Django 5.2
          - python-version: "3.10"
            django-version: "5.2"
          - python-version: "3.11"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "5.2"
          - python-version: "3.13"
            django-version: "5.2"

    name: Python ${{ matrix.python-version }}, Django ${{ matrix.django-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install "Django~=${{ matrix.django-version }}.0" "coverage[toml]" -e .

      - name: Run tests
        run: coverage run test-project/manage.py test livesettings localsite

      - name: Coverage report
        run: coverage report
        # TODO: set --fail-under=N after establishing baseline

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          # CODECOV_TOKEN must be set in repository secrets
          token: ${{ secrets.CODECOV_TOKEN }}
